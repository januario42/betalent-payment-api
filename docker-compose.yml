services:
  mysql:
    image: mysql:8.0
    container_name: betalent_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalent
      MYSQL_USER: betalent
      MYSQL_PASSWORD: betalent
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: betalent_app
    restart: always
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      HOST: 0.0.0.0
      NODE_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:3333
      LOG_LEVEL: info
      SESSION_DRIVER: cookie
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: betalent
      GATEWAY1_URL: http://gateway_mock:3001
      GATEWAY1_EMAIL: dev@betalent.tech
      GATEWAY1_TOKEN: FEC9BB078BF338F464F96B48089EB498
      GATEWAY2_URL: http://gateway_mock:3002
      GATEWAY2_AUTH_TOKEN: tk_f2198cc671b5289fa856
      GATEWAY2_AUTH_SECRET: 3d15e8ed6131446ea7e3456728b1211f
    depends_on:
      mysql:
        condition: service_healthy

  gateway_mock:
    image: matheusprotzen/gateways-mock
    container_name: betalent_gateways
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  mysql_data: